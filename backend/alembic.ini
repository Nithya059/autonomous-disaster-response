# =============================================================================
# Autonomous Disaster Response & Resource Coordinator
# Alembic migration configuration
# =============================================================================

[alembic]
# Path to migration scripts, relative to this file (backend/alembic.ini)
script_location = alembic

# Template for new migration filenames
file_template = %%(rev)s_%%(slug)s

# Timezone for revision timestamps
timezone = UTC

# Max length of slug in filename
truncate_slug_length = 40

# sys.path is modified by pyproject.toml pythonpath setting when running
# pytest, but for direct `alembic` CLI usage we set here explicitly.
# Run all alembic commands from the backend/ directory:
#   cd backend && alembic upgrade head
prepend_sys_path = .

# Database URL is read from environment in alembic/env.py — not set here
# so that .env values are respected and the ini file can be committed safely.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
