# =============================================================================
# Autonomous Disaster Response & Resource Coordinator
# Docker Compose — development + demo deployment
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # FastAPI backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: disaster_backend
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/disaster_response.db
      - PYTHONPATH=/app
    volumes:
      # Persist SQLite database across container restarts
      - db_data:/app/data
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - app_network

  # ---------------------------------------------------------------------------
  # React frontend (nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/Dockerfile.frontend
    container_name: disaster_frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app_network

# ---------------------------------------------------------------------------
# Named volumes
# ---------------------------------------------------------------------------
volumes:
  db_data:
    driver: local

# ---------------------------------------------------------------------------
# Networks
# ---------------------------------------------------------------------------
networks:
  app_network:
    driver: bridge
