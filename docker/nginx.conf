# =============================================================================
# Autonomous Disaster Response — nginx reverse proxy configuration
# Proxies /api/* and /ws/* to the FastAPI backend.
# Serves the React SPA for all other routes (client-side routing support).
# =============================================================================

server {
    listen 80;
    server_name _;

    # Increase buffer sizes for WebSocket traffic
    proxy_buffer_size          128k;
    proxy_buffers              4 256k;
    proxy_busy_buffers_size    256k;

    # --- API proxy ---
    location /api/ {
        proxy_pass         http://backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # --- WebSocket proxy ---
    location /ws/ {
        proxy_pass         http://backend:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
        # Long timeout — WebSocket connections are persistent
    }

    # --- Health check file for Docker HEALTHCHECK ---
    location /health.txt {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # --- React SPA — serve index.html for all non-asset routes ---
    location / {
        root       /usr/share/nginx/html;
        index      index.html;
        try_files  $uri $uri/ /index.html;
        # Cache busting for HTML
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # --- Static assets — long cache TTL ---
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        root       /usr/share/nginx/html;
        expires    1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
